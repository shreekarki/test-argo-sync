apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80
